<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Prenda - Tradiciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --verde-cayambe: #1b4d3e; 
            --verde-claro: #2d6a4f;
            --amarillo-oro: #f9d71c; 
            --borde-logo: #004d00;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; 
        }

        body {
            background-color: #f4f7f6;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            display: flex;
            flex-direction: column; 
        }

        .navbar-custom {
            background-color: var(--verde-cayambe);
            border-bottom: 4px solid var(--amarillo-oro);
            padding: 15px 0;
            flex-shrink: 0;
        }

        .navbar-brand-text {
            font-family: 'Archivo Black', sans-serif;
            color: var(--amarillo-oro) !important;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 2px 2px 0px var(--borde-logo);
            text-decoration: none;
        }

        .btn-logout {
            border: 2px solid var(--amarillo-oro);
            color: var(--amarillo-oro);
            font-weight: 700;
            border-radius: 10px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-logout:hover {
            background-color: var(--amarillo-oro);
            color: var(--verde-cayambe);
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .card-tradiciones {
            border: none;
            border-radius: 25px;
            background: white;
            box-shadow: 0 15px 35px rgba(27, 77, 62, 0.15);
            overflow: hidden;
            width: 100%;
            max-width: 550px;
        }

        .card-tradiciones-header {
            background-color: var(--verde-cayambe);
            color: white;
            padding: 20px;
            border-bottom: 4px solid var(--amarillo-oro);
            text-align: center;
        }

        .header-title {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .form-label {
            color: var(--verde-cayambe);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #eee;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--verde-claro);
            box-shadow: 0 0 0 0.25rem rgba(45, 106, 79, 0.1);
        }

        .btn-guardar {
            background-color: var(--verde-cayambe);
            color: white;
            font-weight: 800;
            border-radius: 15px;
            text-transform: uppercase;
            padding: 15px;
            border: none;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(27, 77, 62, 0.2);
        }

        .btn-guardar:hover {
            background-color: var(--verde-claro);
            color: var(--amarillo-oro);
            transform: translateY(-2px);
        }

        .footer-custom {
            background-color: var(--verde-cayambe);
            border-top: 4px solid var(--amarillo-oro);
            padding: 15px 0;
            text-align: center;
            flex-shrink: 0;
        }

        .footer-brand-text {
            font-family: 'Archivo Black', sans-serif;
            color: var(--amarillo-oro);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-custom shadow">
        <div class="container">
            <a class="navbar-brand navbar-brand-text" href="#">
                TRADICIONES
            </a>
            <a th:href="@{/prendas}" class="btn btn-logout btn-sm px-3 shadow-sm">
                <i class="bi bi-arrow-left me-2"></i>Volver
            </a>
        </div>
    </nav>

    <main class="main-container">
        <div class="card card-tradiciones">
            <div class="card-tradiciones-header">
                <h4 class="header-title">Nueva Prenda</h4>
                <small class="text-white-50 fw-bold">Registro de Inventario</small>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/prendas/guardar}" th:object="${prenda}" method="post">
                    
                    <div class="mb-4">
                        <label for="nombre" class="form-label">Nombre de la Prenda</label>
                        <input type="text" th:field="*{nombre}" class="form-control" 
                               placeholder="Ej: Anaco de Otavalo" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="precioAlquiler" class="form-label">Precio Alquiler</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-2" style="border-radius: 12px 0 0 12px;">$</span>
                                <input type="number" step="0.01" th:field="*{precioAlquiler}" class="form-control" 
                                       style="border-radius: 0 12px 12px 0;" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-4">
                            <label for="cantidad" class="form-label">Cantidad</label>
                            <input type="number" th:field="*{cantidad}" class="form-control" 
                                   placeholder="Ej: 5" required>
                        </div>
                    </div>

                    <div class="alert alert-warning border-0 shadow-sm mb-4" style="border-radius: 15px; background-color: rgba(249, 215, 28, 0.1);">
                        <small class="text-dark fw-bold">
                            <i class="bi bi-info-circle-fill me-2 text-dark"></i>
                            El estado se calculará automáticamente.
                        </small>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-guardar">
                            <i class="bi bi-cloud-check-fill me-2"></i>Guardar Prenda
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer-custom shadow-lg">
        <div class="container">
            <p class="footer-brand-text">SISTEMA TRADICIONES | CAYAMBE - ECUADOR</p>
            <small class="text-white-50" style="font-size: 0.75rem;">Cultura y Folklore en cada prenda</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
