<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Tradiciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --verde-cayambe: #1b4d3e; 
            --verde-claro: #2d6a4f;
            --amarillo-oro: #f9d71c; 
            --borde-logo: #004d00;
        }

        body {
            background: linear-gradient(135deg, var(--verde-cayambe) 0%, #081c15 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            background: #ffffff;
            text-align: center;
            border: 5px solid var(--amarillo-oro);
        }

        .logo-text-container {
            width: 100%; 
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
        }

        .logo-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 10vw, 3.2rem); 
            color: var(--amarillo-oro);
            text-transform: uppercase;
            margin-bottom: 0;
            line-height: 1;
            letter-spacing: -2px;
            white-space: nowrap;
            
            text-shadow: 
                -3px -3px 0 var(--borde-logo),  
                 3px -3px 0 var(--borde-logo),
                -3px  3px 0 var(--borde-logo),
                 3px  3px 0 var(--borde-logo),
                 5px  5px 10px rgba(0,0,0,0.3);
        }

        .sub-title {
            color: var(--verde-cayambe);
            font-weight: 800;
            font-size: clamp(0.7rem, 2.5vw, 0.85rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            margin-top: 5px;
            width: 100%;
        }

        .form-container {
            width: 100%;
            max-width: 340px;
        }

        .form-label {
            color: var(--verde-cayambe);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
            border: 2px solid #f1f3f5;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--amarillo-oro);
            box-shadow: 0 0 0 0.25rem rgba(249, 215, 28, 0.2);
            outline: none;
        }

        .btn-entrar {
            background-color: var(--verde-cayambe);
            border: none;
            color: white;
            font-weight: 800;
            padding: 16px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(27, 77, 62, 0.3);
        }

        .btn-entrar:hover {
            background-color: var(--verde-claro);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .alert {
            border-radius: 15px;
            font-weight: 700;
            border: none;
            padding: 12px;
            margin-bottom: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-text-container">
        <h1 class="logo-text">TRADICIONES</h1>
    </div>
    <p class="sub-title">Sistema de Gestión</p>

    <div class="form-container">
        <div th:if="${param.error}" class="alert alert-danger shadow-sm" role="alert">
            <i class="bi bi-shield-lock-fill me-2"></i> Error de acceso
        </div>

        <div th:if="${param.logout}" class="alert alert-success shadow-sm" role="alert">
            <i class="bi bi-door-open-fill me-2"></i> Sesión finalizada
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" id="username" name="username" class="form-control" 
                       placeholder="Nombre de usuario" required autofocus>
            </div>
            
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" 
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-entrar w-100 shadow">
                ENTRAR AL SISTEMA <i class="bi bi-chevron-right ms-2"></i>
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
